services:

  mongodb:
    image: mongo:7.0
    restart: always
    ports:
    - 27017:27017
    environment:
      MONGO_INITDB_ROOT_USERNAME: root 
      MONGO_INITDB_ROOT_PASSWORD: testpassword
  frontend:
    image: poosdproject/frontend
    build:
      context: .
      dockerfile: ./frontend/docker/Dockerfile
    ports:
      - 80:80
      - 443:443

  backend:
    image: poosdproject/backend
    build:
      context: .
      dockerfile: ./backend/docker/Dockerfile
    ports:
      - 3000:3000
    env_file:
    - path: ./backend/.env
      required: true
